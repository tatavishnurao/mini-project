spring:
  application:
    name: PlacementApp
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/placement_simple_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

langchain4j:
  groq:
    chat-model:
      api-key: ${GROQ_API_KEY}
      model-name: llama-3.3-70b-versatile
      base-url: https://api.groq.com/openai/v1
      temperature: 0.7
